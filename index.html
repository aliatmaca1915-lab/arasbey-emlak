<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arasbey VIP Access</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyA-sbCXLgoOX-T8kPJ1lD1SKs5exWjBCcQ&libraries=places&callback=initMap" async defer></script>

    <style>
        :root {
            --primary: #0d291e; --accent: #d4af37; --bg: #f8f9fa; --text: #2c3e50;
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding-top: 90px; padding-bottom: 90px; color: var(--text); overflow-x: hidden; }
        
        /* GİRİŞ EKRANI (LOGIN) */
        #login-screen { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--primary); z-index: 9999; display: flex; align-items: center; justify-content: center; transition: 0.5s; }
        .login-box { background: white; padding: 40px 30px; border-radius: 25px; width: 85%; max-width: 350px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        .login-logo { font-size: 24px; font-weight: 900; color: var(--primary); margin-bottom: 10px; }
        .login-p { font-size: 11px; color: var(--accent); font-weight: 700; text-transform: uppercase; margin-bottom: 30px; letter-spacing: 2px; }

        /* Sabit Başlık */
        .header { background: #fff; padding: 25px 15px 15px; text-align: center; border-bottom: 2px solid #f0f0f0; position: fixed; top: 0; width: 100%; z-index: 1001; box-sizing: border-box; }
        .header h1 { margin: 0; font-size: 22px; color: var(--primary); font-weight: 900; }
        .header p { margin: 5px 0 0; font-size: 10px; color: var(--accent); font-weight: 700; text-transform: uppercase; letter-spacing: 2px; }

        /* Alt Menü */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); display: flex; box-shadow: 0 -5px 25px rgba(0,0,0,0.05); z-index: 1000; border-top: 1px solid #eee; }
        .nav-item { flex: 1; text-align: center; padding: 15px 0; color: #a0a0a0; font-size: 11px; font-weight: 800; cursor: pointer; text-transform: uppercase; }
        .nav-item.active { color: var(--primary); }
        .nav-icon { font-size: 24px; display: block; margin-bottom: 5px; opacity: 0.5; }
        .nav-item.active .nav-icon { opacity: 1; }

        .content { display: none; padding: 10px 15px; max-width: 500px; margin: auto; }
        .content.active { display: block; animation: slideUp 0.4s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; } }

        /* Kartlar & Formlar */
        .form-card { background: white; padding: 22px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .card-header { font-size: 12px; font-weight: 800; color: var(--primary); text-transform: uppercase; margin-bottom: 15px; border-bottom: 1px solid #f0f0f0; padding-bottom: 10px; }
        input.form-input { width: 100%; padding: 16px; border: 1.5px solid #eee; border-radius: 12px; font-size: 15px; margin-bottom: 15px; box-sizing: border-box; font-weight: 600; }
        
        #map-picker { height: 280px; border-radius: 14px; margin-bottom: 15px; border: 1px solid #eee; }
        .btn-primary { background: var(--primary); color: white; border: none; padding: 20px; width: 100%; border-radius: 16px; font-size: 15px; font-weight: 800; cursor: pointer; text-transform: uppercase; }
        
        /* Arşiv */
        .record-card { background: white; border-radius: 20px; overflow: hidden; margin-bottom: 25px; border: 1px solid #f0f0f0; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .record-img { width: 100%; height: 220px; object-fit: cover; border-bottom: 3px solid var(--accent); }
        .record-body { padding: 20px; position: relative; }
        .btn-edit { position: absolute; right: 20px; top: 20px; background: #fff; border: 1.5px solid #eaeaea; padding: 8px 12px; border-radius: 8px; font-weight: 800; font-size: 11px; cursor: pointer; }

        .record-info { display: flex; justify-content: space-between; background: #f8f9fa; padding: 12px; border-radius: 10px; margin-bottom: 15px; }
        .info-box { text-align: center; flex: 1; }
        .info-label { display: block; font-size: 10px; color: #888; text-transform: uppercase; font-weight: 700; }
        .info-val { font-size: 14px; color: var(--primary); font-weight: 800; }

        .btn-action { width: 100%; display: block; padding: 15px; border-radius: 12px; text-align: center; text-decoration: none; font-size: 12px; font-weight: 800; text-transform: uppercase; margin-bottom: 10px; box-sizing: border-box; }
        .btn-whatsapp { background: #25D366; color: white; border: none; }

        /* Modal */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 2000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-box { background: white; padding: 25px; border-radius: 20px; width: 90%; max-width: 400px; max-height: 90vh; overflow-y: auto; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <div class="login-logo">ARASBEY</div>
            <div class="login-p">VIP Portföy Erişimi</div>
            <input type="password" id="pass-input" class="form-input" placeholder="Erişim Şifresi" style="text-align: center;">
            <button class="btn-primary" onclick="checkPass()">SİSTEME GİRİŞ YAP</button>
        </div>
    </div>

    <div class="header">
        <h1>ARASBEY GAYRİMENKUL</h1>
        <p>VIP Portföy Yönetimi</p>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('tab-yeni')" id="nav-yeni">
            <span class="nav-icon">📍</span> Yeni Ekle
        </div>
        <div class="nav-item" onclick="arhiveGec()" id="nav-liste">
            <span class="nav-icon">📁</span> VIP Arşiv
        </div>
    </div>

    <div id="tab-yeni" class="content active">
        <div class="form-card">
            <div class="card-header">🌍 Lokasyon Tespiti</div>
            <div id="map-picker"></div>
            <input id="pac-input" type="text" class="form-input" placeholder="🔍 Yer Ara...">
            <div style="text-align:center; font-size:11px; color:var(--accent); font-weight:800;" id="coord-info">Konum Seçiniz</div>
        </div>
        <div class="form-card">
            <div class="card-header">📄 Tapu Bilgileri</div>
            <input type="text" id="ilce" class="form-input" placeholder="İlçe / İl">
            <input type="text" id="mahalle" class="form-input" placeholder="Mahalle">
            <div style="display:flex; gap:10px;">
                <input type="number" id="ada" class="form-input" placeholder="Ada">
                <input type="number" id="parsel" class="form-input" placeholder="Parsel">
            </div>
            <input type="number" step="0.01" id="m2" class="form-input" placeholder="Metrekare (m²)">
        </div>
        <div class="form-card">
            <div class="card-header">📸 Fotoğraf</div>
            <input type="file" id="foto" accept="image/*" style="width:100%;">
        </div>
        <button class="btn-primary" id="saveBtn" onclick="sistemeIsle()">SİSTEME KAYDET</button>
    </div>

    <div id="tab-liste" class="content">
        <div id="liste-container"></div>
    </div>

    <div id="editModal" class="modal-overlay">
        <div class="modal-box">
            <h3 style="margin:0 0 20px; border-bottom:2px solid #eee; padding-bottom:10px;">✏️ Kaydı Güncelle</h3>
            <label style="font-size:10px; font-weight:800; color:#888;">İLÇE / İL</label>
            <input type="text" id="edit-ilce" class="form-input">
            <label style="font-size:10px; font-weight:800; color:#888;">MAHALLE</label>
            <input type="text" id="edit-mahalle" class="form-input">
            <div style="display:flex; gap:10px;">
                <input type="number" id="edit-ada" class="form-input" placeholder="Ada">
                <input type="number" id="edit-parsel" class="form-input" placeholder="Parsel">
            </div>
            <input type="number" step="0.01" id="edit-m2" class="form-input">
            
            <label style="font-size:10px; font-weight:800; color:#888; display:block; margin-bottom:5px;">🖼️ FOTOĞRAFI DEĞİŞTİR (Opsiyonel)</label>
            <input type="file" id="edit-foto" accept="image/*" style="width:100%; margin-bottom:20px;">

            <div style="display:flex; gap:10px;">
                <button class="btn-primary" style="background:#f0f4f8; color:#555;" onclick="modalKapat()">İPTAL</button>
                <button class="btn-primary" id="modalSaveBtn" onclick="kaydiGuncelle()">KAYDET</button>
            </div>
            <button onclick="kaydiSil()" style="width:100%; background:none; border:none; color:#d32f2f; margin-top:20px; font-weight:bold; cursor:pointer; text-decoration:underline;">🗑️ Kaydı Sil</button>
        </div>
    </div>

    <script>
        // SUPABASE AYARLARI
        const S_URL = 'https://khzbzwmibqstspoknsxu.supabase.co';
        const S_KEY = 'sb_publishable_M8VSs5G9EGjIJgNF2Bn14w_vGi95O0I';
        const _client = supabase.createClient(S_URL, S_KEY);

        let map, marker, geocoder;
        let cLat = 39.94, cLng = 32.66;
        let globalPortfoy = [], aktifEditId = null;

        // ŞİFRE KONTROLÜ (Senin Belirlediğin Şifre: arasbey2024)
        function checkPass() {
            const pass = document.getElementById('pass-input').value;
            if(pass === "arasbey2024") {
                document.getElementById('login-screen').style.opacity = "0";
                setTimeout(() => document.getElementById('login-screen').style.display = "none", 500);
            } else {
                alert("Hatalı Şifre!");
            }
        }

        function switchTab(id) {
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'tab-yeni') {
                document.getElementById('nav-yeni').classList.add('active');
                if(map) setTimeout(() => { google.maps.event.trigger(map, 'resize'); map.setCenter({lat: cLat, lng: cLng}); }, 100);
            } else document.getElementById('nav-liste').classList.add('active');
            window.scrollTo(0,0);
        }

        function arhiveGec() { switchTab('tab-liste'); portfoyGetir(); }

        function initMap() {
            geocoder = new google.maps.Geocoder();
            map = new google.maps.Map(document.getElementById("map-picker"), { center: { lat: cLat, lng: cLng }, zoom: 14, mapTypeId: 'hybrid', disableDefaultUI: true, zoomControl: true });
            marker = new google.maps.Marker({ position: { lat: cLat, lng: cLng }, map: map, draggable: true, icon: { path: google.maps.SymbolPath.CIRCLE, scale: 11, fillColor: "#d4af37", fillOpacity: 1, strokeWeight: 3, strokeColor: "#0d291e" } });
            
            const input = document.getElementById("pac-input");
            const sb = new google.maps.places.SearchBox(input);
            sb.addListener("places_changed", () => {
                const loc = sb.getPlaces()[0].geometry.location;
                map.setCenter(loc); map.setZoom(17); place(loc);
            });

            map.addListener("click", (e) => place(e.latLng));
            marker.addListener("dragend", (e) => place(e.latLng));
            adres(cLat, cLng);
        }

        function place(loc) {
            marker.setPosition(loc); cLat = loc.lat(); cLng = loc.lng();
            document.getElementById('coord-info').innerText = `${cLat.toFixed(5)}, ${cLng.toFixed(5)}`;
            adres(cLat, cLng);
        }

        function adres(lat, lng) {
            geocoder.geocode({ location: { lat, lng } }, (res, stat) => {
                if (stat === "OK" && res[0]) {
                    let il = "", ilce = "", mah = "";
                    res[0].address_components.forEach(c => {
                        if (c.types.includes("administrative_area_level_1")) il = c.long_name;
                        if (c.types.includes("administrative_area_level_2")) ilce = c.long_name;
                        if (c.types.includes("sublocality") || c.types.includes("neighborhood")) mah = c.long_name;
                    });
                    document.getElementById('ilce').value = `${ilce} / ${il}`;
                    document.getElementById('mahalle').value = mah;
                }
            });
        }

        // KAYIT İŞLEMİ
        async function sistemeIsle() {
            const btn = document.getElementById('saveBtn'); const f = document.getElementById('foto').files[0];
            btn.disabled = true; btn.innerText = "YÜKLENİYOR...";
            try {
                let img = "";
                if (f) {
                    const n = `${Date.now()}-${f.name.replace(/\s/g, '_')}`;
                    await _client.storage.from('arsalar').upload(n, f);
                    img = `${S_URL}/storage/v1/object/public/arsalar/${n}`;
                }
                const p = { ilce: document.getElementById('ilce').value, mahalle: document.getElementById('mahalle').value, ada_no: parseInt(document.getElementById('ada').value), parsel_no: parseInt(document.getElementById('parsel').value), m2: parseFloat(document.getElementById('m2').value), konum_lat: cLat, konum_lng: cLng, fotograf_url: img };
                await _client.from('arsa_kayitlari').insert([p]);
                alert("Kaydedildi!"); arhiveGec();
            } catch (e) { alert("Hata!"); } finally { btn.disabled = false; btn.innerText = "SİSTEME KAYDET"; }
        }

        // DÜZENLEME & FOTOĞRAF DEĞİŞTİRME
        function modalAc(id) {
            aktifEditId = id; const k = globalPortfoy.find(x => x.id == id);
            document.getElementById('edit-ilce').value = k.ilce;
            document.getElementById('edit-mahalle').value = k.mahalle;
            document.getElementById('edit-ada').value = k.ada_no;
            document.getElementById('edit-parsel').value = k.parsel_no;
            document.getElementById('edit-m2').value = k.m2;
            document.getElementById('editModal').style.display = 'flex';
        }

        function modalKapat() { document.getElementById('editModal').style.display = 'none'; }

        async function kaydiGuncelle() {
            const btn = document.getElementById('modalSaveBtn'); const f = document.getElementById('edit-foto').files[0];
            btn.disabled = true; btn.innerText = "GÜNCELLENİYOR...";
            try {
                let p = { ilce: document.getElementById('edit-ilce').value, mahalle: document.getElementById('edit-mahalle').value, ada_no: parseInt(document.getElementById('edit-ada').value), parsel_no: parseInt(document.getElementById('edit-parsel').value), m2: parseFloat(document.getElementById('edit-m2').value) };
                if (f) {
                    const n = `${Date.now()}-${f.name.replace(/\s/g, '_')}`;
                    await _client.storage.from('arsalar').upload(n, f);
                    p.fotograf_url = `${S_URL}/storage/v1/object/public/arsalar/${n}`;
                }
                await _client.from('arsa_kayitlari').update(p).eq('id', aktifEditId);
                modalKapat(); portfoyGetir();
            } catch (e) { alert("Hata!"); } finally { btn.disabled = false; btn.innerText = "KAYDET"; }
        }

        async function kaydiSil() { if(confirm("SİLİNSİN Mİ?")) { await _client.from('arsa_kayitlari').delete().eq('id', aktifEditId); modalKapat(); portfoyGetir(); } }

        async function portfoyGetir() {
            const box = document.getElementById('liste-container'); box.innerHTML = "Yükleniyor...";
            const { data } = await _client.from('arsa_kayitlari').select('*').order('id', { ascending: false });
            globalPortfoy = data;
            box.innerHTML = data.map(i => {
                const wp = encodeURIComponent(`🏢 *ARASBEY GAYRİMENKUL*\n📍 ${i.ilce} - ${i.mahalle}\n📝 Ada: ${i.ada_no} | Parsel: ${i.parsel_no}\n📏 Alan: ${i.m2} m2\n🗺️ Konum: https://maps.google.com/?q=${i.konum_lat},${i.konum_lng}`);
                return `<div class="record-card">
                    ${i.fotograf_url ? `<img src="${i.fotograf_url}" class="record-img">` : ''}
                    <div class="record-body">
                        <button class="btn-edit" onclick="modalAc(${i.id})">✏️ Düzenle</button>
                        <h3 style="margin:0 0 10px;">📍 ${i.ilce} / ${i.mahalle}</h3>
                        <div class="record-info">
                            <div class="info-box"><span class="info-label">Ada</span><span class="info-val">${i.ada_no}</span></div>
                            <div class="info-box"><span class="info-label">Parsel</span><span class="info-val">${i.parsel_no}</span></div>
                            <div class="info-box"><span class="info-label">Alan</span><span class="info-val">${i.m2} m2</span></div>
                        </div>
                        <a href="https://parselsorgu.tkgm.gov.tr/#ara/cografi/${i.konum_lat}/${i.konum_lng}" target="_blank" class="btn-action btn-tkgm-large" style="background:rgba(212,175,55,0.1); color:#9c7b3c; border:1px solid rgba(212,175,55,0.3);">🏛️ TKGM SORGULA</a>
                        <a href="https://www.google.com/maps/search/?api=1&query=$...{i.konum_lat},${i.konum_lng}" target="_blank" class="btn-action btn-maps">🗺️ YOL TARİFİ AL</a>
                        <a href="https://api.whatsapp.com/send?text=${wp}" target="_blank" class="btn-action btn-whatsapp">📲 MÜŞTERİYE GÖNDER</a>
                    </div>
                </div>`;
            }).join('');
        }
    </script>
</body>
</html>
