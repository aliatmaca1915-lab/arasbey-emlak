<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arasbey Emlak v3</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 15px; background: #f8f9fa; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 450px; margin: auto; }
        h2 { text-align: center; color: #1b5e20; margin-bottom: 5px; }
        .version { text-align: center; font-size: 10px; color: #aaa; margin-bottom: 20px; }
        label { font-weight: 600; display: block; margin-top: 15px; font-size: 14px; }
        input { width: 100%; padding: 14px; margin-top: 6px; border: 1.5px solid #ddd; border-radius: 12px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 16px; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; margin-top: 20px; cursor: pointer; }
        .save-btn { background: #2e7d32; color: white; }
        .loc-btn { background: #1976d2; color: white; margin-top: 10px; }
        #status { text-align: center; margin-top: 10px; font-size: 13px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Arasbey Gayrimenkul</h2>
        <div class="version">Sistem Sürümü: v3.0 (API Kontrollü)</div>
        
        <label>İlçe</label>
        <input type="text" id="ilce" placeholder="Etimesgut, Sincan vb.">
        <label>Mahalle</label>
        <input type="text" id="mahalle" placeholder="Mahalle adı">
        <label>Ada No</label>
        <input type="number" id="ada" placeholder="000">
        <label>Parsel No</label>
        <input type="number" id="parsel" placeholder="000">
        <label>Metrekare (m²)</label>
        <input type="number" id="m2" placeholder="0.00">
        <label>Fotoğraf</label>
        <input type="file" id="foto" accept="image/*">

        <button type="button" class="loc-btn" onclick="getGPS()">📍 Konumu İşle</button>
        <div id="status"></div>
        <button type="button" class="save-btn" id="btn" onclick="save()">BULUTA KAYDET</button>
    </div>

    <script>
        // Bilgileri doğrudan buraya gömdüm, hata payı bırakmadım
        const URL = 'https://khzbzwmibqstspoknsxu.supabase.co';
        const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtoemJ6d21pYnFzdHNwb2tuc3h1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4NzQ4NzIsImV4cCI6MjA4ODQ1MDg3Mn0.g7DwZ9xMag_vYP25ZGo-41ZCHUgit4x-mDaEna9rMwo';
        const _s = supabase.createClient(URL, KEY);

        let coords = { lat: null, lng: null };

        function getGPS() {
            const s = document.getElementById('status');
            s.innerText = "GPS aranıyor...";
            navigator.geolocation.getCurrentPosition(p => {
                coords.lat = p.coords.latitude;
                coords.lng = p.coords.longitude;
                s.innerText = "✅ Konum Alındı";
                s.style.color = "green";
            }, e => { s.innerText = "❌ GPS Hatası!"; s.style.color = "red"; });
        }

        async function save() {
            const b = document.getElementById('btn');
            b.innerText = "Kaydediliyor..."; b.disabled = true;

            const data = {
                ilce: document.getElementById('ilce').value,
                mahalle: document.getElementById('mahalle').value,
                ada_no: parseInt(document.getElementById('ada').value),
                parsel_no: parseInt(document.getElementById('parsel').value),
                m2: parseFloat(document.getElementById('m2').value),
                konum_lat: coords.lat,
                konum_lng: coords.lng
            };

            const { error } = await _s.from('arsa_kayitlari').insert([data]);
            if (error) {
                alert("Hata: " + error.message);
                b.innerText = "TEKRAR DENE"; b.disabled = false;
            } else {
                alert("Arasbey Gayrimenkul: Kayıt Buluta Uçtu! 🚀");
                location.reload();
            }
        }
    </script>
</body>
</html>
