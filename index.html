<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arasbey Gayrimenkul Pro v19</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyA-sbCXLgoOX-T8kPJ1lD1SKs5exWjBCcQ&callback=initMap" async defer></script>

    <style>
        body { font-family: -apple-system, sans-serif; margin: 0; background: #f0f2f5; color: #333; }
        .tabs { display: flex; background: #1b5e20; padding: 10px; position: sticky; top: 0; z-index: 1000; }
        .tab { flex: 1; text-align: center; color: white; padding: 12px; font-weight: bold; cursor: pointer; border-radius: 8px; font-size: 14px; }
        .tab.active { background: #2e7d32; }
        .content { padding: 15px; display: none; }
        .content.active { display: block; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        #map-picker { height: 300px; width: 100%; border-radius: 12px; margin-top: 10px; border: 1.5px solid #ddd; }
        input, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; font-size: 15px; }
        .save-btn { background: #2e7d32; color: white; border: none; font-weight: bold; margin-top: 20px; }
        .record-item { background: white; padding: 15px; border-radius: 12px; margin-bottom: 12px; border-left: 6px solid #2e7d32; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .record-img { width: 100%; border-radius: 8px; margin-top: 10px; max-height: 200px; object-fit: cover; }
        .action-links { display: flex; gap: 8px; margin-top: 12px; }
        .action-links a { flex: 1; text-align: center; padding: 10px; border-radius: 8px; text-decoration: none; color: white; font-size: 12px; font-weight: bold; }
        .gmaps-link { background: #4285F4; }
        .tkgm-link { background: #e65100; }
        #coord-info { font-size: 11px; color: #2e7d32; font-weight: bold; text-align: center; margin-top: 5px; }
    </style>
</head>
<body>

<div class="tabs">
    <div class="tab active" onclick="switchTab('kayit-form')">➕ Yeni Kayıt</div>
    <div class="tab" onclick="switchTab('kayitlar-liste'); listele()">📋 Kayıtlar</div>
</div>

<div id="kayit-form" class="content active">
    <div class="card">
        <h3 style="margin:0; color:#1b5e20; text-align:center;">📍 Haritadan Arsayı Seç</h3>
        <div id="map-picker"></div>
        <div id="coord-info">Haritaya tıklayarak yer işaretleyin</div>
        
        <label style="font-size:12px; font-weight:bold; margin-top:15px; display:block;">Arazi Detayları</label>
        <input type="text" id="ilce" placeholder="İlçe (Etimesgut, Sincan vb.)">
        <input type="text" id="mahalle" placeholder="Mahalle">
        <div style="display:flex; gap:10px;">
            <input type="number" id="ada" placeholder="Ada">
            <input type="number" id="parsel" placeholder="Parsel">
        </div>
        <input type="number" step="0.01" id="m2" placeholder="Metrekare (m²)">
        
        <label style="font-size:12px; font-weight:bold; margin-top:10px; display:block;">Fotoğraf</label>
        <input type="file" id="foto" accept="image/*">
        
        <button class="save-btn" id="saveBtn" onclick="kaydet()">BULUTA KAYDET</button>
    </div>
</div>

<div id="kayitlar-liste" class="content">
    <div id="liste-container" style="max-width:500px; margin:auto;">
        <p style="text-align:center; color:#666;">Yükleniyor...</p>
    </div>
</div>

<script>
    // Supabase Bağlantın
    const S_URL = 'https://khzbzwmibqstspoknsxu.supabase.co';
    const S_KEY = 'sb_publishable_M8VSs5G9EGjIJgNF2Bn14w_vGi95O0I';
    const _supa = supabase.createClient(S_URL, S_KEY);

    let map, marker;
    let selectedLat = 39.94, selectedLng = 32.66; // Etimesgut merkezli başla

    // Google Haritayı Başlat
    function initMap() {
        map = new google.maps.Map(document.getElementById("map-picker"), {
            center: { lat: selectedLat, lng: selectedLng },
            zoom: 14,
            mapTypeId: 'hybrid' // Uydu görüntüsü + sokak adları
        });

        marker = new google.maps.Marker({
            position: { lat: selectedLat, lng: selectedLng },
            map: map,
            draggable: true,
            animation: google.maps.Animation.DROP
        });

        map.addListener("click", (e) => {
            placeMarker(e.latLng);
        });

        marker.addListener("dragend", (e) => {
            selectedLat = e.latLng.lat();
            selectedLng = e.latLng.lng();
            updateCoordText();
        });
    }

    function placeMarker(location) {
        marker.setPosition(location);
        selectedLat = location.lat();
        selectedLng = location.lng();
        updateCoordText();
    }

    function updateCoordText() {
        document.getElementById('coord-info').innerText = "📍 Seçili: " + selectedLat.toFixed(5) + ", " + selectedLng.toFixed(5);
    }

    function switchTab(id) {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    // KAYDETME
    async function kaydet() {
        const btn = document.getElementById('saveBtn');
        const file = document.getElementById('foto').files[0];
        btn.disabled = true; btn.innerText = "Yükleniyor...";

        try {
            let imgUrl = "";
            if (file) {
                const fName = `${Date.now()}-${file.name.replace(/\s/g, '_')}`;
                const { data: upData, error: upError } = await _supa.storage.from('arsalar').upload(fName, file);
                if (upError) throw upError;
                imgUrl = `${S_URL}/storage/v1/object/public/arsalar/${fName}`;
            }

            const veri = {
                ilce: document.getElementById('ilce').value || "Belirtilmedi",
                mahalle: document.getElementById('mahalle').value,
                ada_no: parseInt(document.getElementById('ada').value) || 0,
                parsel_no: parseInt(document.getElementById('parsel').value) || 0,
                m2: parseFloat(document.getElementById('m2').value) || 0,
                konum_lat: selectedLat,
                konum_lng: selectedLng,
                fotograf_url: imgUrl
            };

            const { error } = await _supa.from('arsa_kayitlari').insert([veri]);
            if (error) throw error;

            alert("Kayıt Başarılı! 🚀");
            location.reload();
        } catch (err) {
            alert("Hata: " + err.message);
            btn.disabled = false; btn.innerText = "TEKRAR DENE";
        }
    }

    // LİSTELEME
    async function listele() {
        const container = document.getElementById('liste-container');
        container.innerHTML = "<p style='text-align:center;'>Veriler çekiliyor...</p>";
        
        const { data, error } = await _supa.from('arsa_kayitlari').select('*').order('created_at', { ascending: false });

        if (error) { container.innerHTML = "Hata oluştu."; return; }
        if (data.length === 0) { container.innerHTML = "Henüz kayıtlı arsa yok."; return; }
        
        container.innerHTML = data.map(i => `
            <div class="record-item">
                <div style="font-weight:bold; color:#1b5e20; font-size:16px;">${i.ilce.toUpperCase()} / ${i.mahalle}</div>
                <div style="font-size:13px; color:#666; margin-top:4px;">
                    Ada: <b>${i.ada_no}</b> | Parsel: <b>${i.parsel_no}</b> | <b>${i.m2} m²</b>
                </div>
                ${i.fotograf_url ? `<img src="${i.fotograf_url}" class="record-img">` : ''}
                <div class="action-links">
                    <a href="https://www.google.com/maps/search/?api=1&query=${i.konum_lat},${i.konum_lng}" target="_blank" class="gmaps-link">Google Harita</a>
                    <a href="https://parselsorgu.tkgm.gov.tr/#ara/cografi/${i.konum_lat}/${i.konum_lng}" target="_blank" class="tkgm-link">TKGM Sorgu</a>
                </div>
            </div>
        `).join('');
    }
</script>
</body>
</html>
