<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arasbey Emlak v4</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 15px; background: #f4f4f9; color: #333; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); max-width: 480px; margin: auto; }
        h2 { text-align: center; color: #1b5e20; margin-bottom: 5px; }
        .version { text-align: center; font-size: 11px; color: #888; margin-bottom: 20px; }
        label { font-weight: bold; display: block; margin-top: 12px; font-size: 14px; color: #555; }
        input { width: 100%; padding: 14px; margin-top: 6px; border: 1px solid #ccc; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 16px; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; margin-top: 20px; cursor: pointer; transition: 0.2s; }
        .save-btn { background: #2e7d32; color: white; }
        .loc-btn { background: #0277bd; color: white; margin-top: 10px; }
        #status { text-align: center; margin-top: 10px; font-size: 13px; font-weight: bold; min-height: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Arasbey Gayrimenkul</h2>
        <div class="version">Sistem Sürümü: v4.0 (Yeni API Anahtarı)</div>
        
        <label>İlçe</label>
        <input type="text" id="ilce" placeholder="Etimesgut, Sincan vb.">

        <label>Mahalle</label>
        <input type="text" id="mahalle" placeholder="Mahalle adı">

        <label>Ada No</label>
        <input type="number" id="ada" placeholder="000">

        <label>Parsel No</label>
        <input type="number" id="parsel" placeholder="000">

        <label>Metrekare (m²)</label>
        <input type="number" step="0.01" id="m2" placeholder="0.00">

        <label>Fotoğraf (Kamera veya Galeri)</label>
        <input type="file" id="foto" accept="image/*">

        <button type="button" class="loc-btn" onclick="getGPS()">📍 Konumu İşle</button>
        <div id="status"></div>
        
        <button type="button" class="save-btn" id="btn" onclick="save()">BULUTA KAYDET</button>
    </div>

    <script>
        // Senin verdiğin güncel bilgilerle bağladım
        const URL = 'https://khzbzwmibqstspoknsxu.supabase.co';
        const KEY = 'sb_publishable_M8VSs5G9EGjIJgNF2Bn14w_vGi95O0I';
        const _supa = supabase.createClient(URL, KEY);

        let coords = { lat: null, lng: null };

        function getGPS() {
            const st = document.getElementById('status');
            st.innerText = "GPS aranıyor...";
            navigator.geolocation.getCurrentPosition(p => {
                coords.lat = p.coords.latitude;
                coords.lng = p.coords.longitude;
                st.innerText = "✅ Konum Başarıyla Alındı";
                st.style.color = "green";
            }, e => { 
                st.innerText = "❌ Hata: Konum iznini kontrol edin."; 
                st.style.color = "red"; 
            }, { enableHighAccuracy: true });
        }

        async function save() {
            const b = document.getElementById('btn');
            b.innerText = "Kaydediliyor..."; b.disabled = true;

            const data = {
                ilce: document.getElementById('ilce').value,
                mahalle: document.getElementById('mahalle').value,
                ada_no: parseInt(document.getElementById('ada').value),
                parsel_no: parseInt(document.getElementById('parsel').value),
                m2: parseFloat(document.getElementById('m2').value),
                konum_lat: coords.lat,
                konum_lng: coords.lng
            };

            const { error } = await _supa.from('arsa_kayitlari').insert([data]);

            if (error) {
                alert("Hata: " + error.message);
                b.innerText = "TEKRAR DENE"; b.disabled = false;
            } else {
                alert("Arasbey Gayrimenkul: Kayıt Başarılı! 🚀");
                location.reload(); 
            }
        }
    </script>
</body>
</html>
